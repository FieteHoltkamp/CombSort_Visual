<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CombSort Visualisierung</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e24;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        h1 {
            margin-bottom: 10px;
            color: #00adb5;
        }

        #control-panel {
            margin-bottom: 20px;
            background-color: #2a2a35;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            gap: 20px;
            align-items: center;
        }

        label {
            font-weight: bold;
        }

        input[type="range"] {
            cursor: pointer;
        }

        button {
            background-color: #00adb5;
            border: none;
            color: white;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #007c82;
        }

        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        #container {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            width: 800px;
            height: 400px;
            background-color: #2a2a35;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            gap: 3px;
        }

        .bar {
            flex: 1;
            background-color: #393e46;
            border-top-left-radius: 3px;
            border-top-right-radius: 3px;
            transition: background-color 0.05s ease;
        }

        .bar.comparing {
            background-color: #ff4141 !important; /* Rot für Vergleich */
        }

        .bar.sorted {
            background-color: #2ecc71 !important; /* Grün für fertig sortiert */
        }
    </style>
</head>
<body>

    <h1>CombSort Visualisierung</h1>

    <div id="control-panel">
        <button id="start-btn" onclick="startSort()">Sortieren starten</button>
        <button id="reset-btn" onclick="resetArray()">Neu generieren</button>
        <div>
            <label for="speed">Verzögerung: </label>
            <input type="range" id="speed" min="1" max="200" value="50">
            <span id="speed-val">50</span> ms
        </div>
    </div>

    <div id="container" id="array-container"></div>

    <script>
        const container = document.getElementById('container');
        const speedInput = document.getElementById('speed');
        const speedVal = document.getElementById('speed-val');
        const startBtn = document.getElementById('start-btn');
        const resetBtn = document.getElementById('reset-btn');
        
        const ARRAY_SIZE = 50;
        let array = [];
        let isSorting = false;

        // Zeigt den aktuellen Slider-Wert an
        speedInput.addEventListener('input', () => {
            speedVal.textContent = speedInput.value;
        });

        // Hilfsfunktion für die Verzögerung (Animation)
        const sleep = () => {
            const ms = parseInt(speedInput.value);
            return new Promise(resolve => setTimeout(resolve, ms));
        };

        // Generiert ein neues, zufälliges Array und zeichnet die Balken
        function resetArray() {
            if (isSorting) return;
            array = [];
            container.innerHTML = '';
            
            for (let i = 0; i < ARRAY_SIZE; i++) {
                // Werte zwischen 10 und 380 für die Höhe in Pixeln
                const val = Math.floor(Math.random() * 370) + 10;
                array.push(val);
                
                const bar = document.createElement('div');
                bar.classList.add('bar');
                bar.style.height = `${val}px`;
                bar.id = `bar-${i}`;
                container.appendChild(bar);
            }
            startBtn.disabled = false;
        }

        // Der eigentliche CombSort Algorithmus als animierte async-Funktion
        async function combSort() {
            let gap = array.length;
            const shrink = 1.3;
            let sorted = false;

            const bars = document.getElementsByClassName('bar');

            while (!sorted) {
                // Aktualisiere die Schrittweite (Gap)
                gap = Math.floor(gap / shrink);
                if (gap <= 1) {
                    gap = 1;
                    sorted = true; // Könnte fertig sein, wenn kein Tausch mehr stattfindet
                }

                let i = 0;
                while (i + gap < array.length) {
                    // Markiere die beiden zu vergleichenden Balken rot
                    bars[i].classList.add('comparing');
                    bars[i + gap].classList.add('comparing');

                    // Wartezeit für die Animation
                    await sleep();

                    if (array[i] > array[i + gap]) {
                        // Tausche die Werte im Array
                        let temp = array[i];
                        array[i] = array[i + gap];
                        array[i + gap] = temp;

                        // Tausche die Höhen visuell
                        bars[i].style.height = `${array[i]}px`;
                        bars[i + gap].style.style.height = `${array[i + gap]}px`;

                        // Wenn getauscht wurde, sind wir noch nicht komplett fertig
                        if (gap === 1) {
                            sorted = false;
                        }
                    }

                    // Entferne die rote Markierung wieder
                    bars[i].classList.remove('comparing');
                    bars[i + gap].classList.remove('comparing');

                    i++;
                }
            }

            // Am Ende alles grün einfärben, da das Array nun komplett sortiert ist
            for (let k = 0; k < bars.length; k++) {
                bars[k].classList.add('sorted');
                await new Promise(resolve => setTimeout(resolve, 10)); // Kleiner visueller Effekt beim Abschluss
            }
        }

        async function startSort() {
            isSorting = true;
            startBtn.disabled = true;
            resetBtn.disabled = true;
            speedInput.disabled = false; // Geschwindigkeit kann während des Laufs geändert werden

            await combSort();

            isSorting = false;
            resetBtn.disabled = false;
        }

        // Initiales Array beim Laden der Seite erzeugen
        resetArray();
    </script>
</body>
</html>
