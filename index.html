<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CombSort Visualisierung XXL</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1d; /* Etwas dunkler */
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* Start am oberen Rand */
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 {
            margin-bottom: 15px;
            color: #00e5ff; /* Helleres Cyan */
            font-size: 2.5rem;
        }

        #control-panel {
            margin-bottom: 25px;
            background-color: #2e2e33;
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
            display: flex;
            gap: 25px;
            align-items: center;
            width: 100%;
            max-width: 1000px;
            justify-content: center;
        }

        label {
            font-weight: bold;
            font-size: 1.1rem;
        }

        input[type="range"] {
            cursor: pointer;
            width: 250px;
        }

        #speed-val {
            display: inline-block;
            width: 40px;
            text-align: right;
            font-weight: bold;
        }

        button {
            background-color: #00e5ff;
            border: none;
            color: #1a1a1d;
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: #00b8cc;
        }

        button:active {
            transform: scale(0.97);
        }

        button:disabled {
            background-color: #555;
            color: #aaa;
            cursor: not-allowed;
        }

        #container {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            width: 100%;
            max-width: 1200px; /* Deutlich breiter */
            height: 600px; /* Deutlich höher */
            background-color: #2e2e33;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.6);
            gap: 4px; /* Mehr Abstand */
            overflow: hidden;
        }

        /* Container für Balken + Zahl */
        .bar-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            height: 100%;
        }

        /* Die Zahl über dem Balken */
        .bar-label {
            font-size: 0.9rem;
            margin-bottom: 4px;
            color: #ddd;
            font-weight: bold;
            transition: color 0.1s;
        }

        /* Der Balken selbst */
        .bar {
            width: 100%;
            background-color: #555e69; /* Etwas helleres Grau */
            border-top-left-radius: 4px;
            border-top-right-radius: 4px;
            transition: background-color 0.05s ease, height 0.1s ease;
        }

        /* Zustände während der Animation */
        .bar-wrapper.comparing .bar {
            background-color: #ff4141 !important; /* Rot für Vergleich */
        }
        .bar-wrapper.comparing .bar-label {
            color: #ff4141; /* Zahl auch rot */
        }

        .bar-wrapper.sorted .bar {
            background-color: #2ecc71 !important; /* Grün für fertig */
        }
        .bar-wrapper.sorted .bar-label {
            color: #2ecc71; /* Zahl auch grün */
        }
    </style>
</head>
<body>

    <h1>CombSort Visualisierung XXL</h1>

    <div id="control-panel">
        <button id="start-btn" onclick="startSort()">Sortieren starten</button>
        <button id="reset-btn" onclick="resetArray()">Neu generieren</button>
        <div>
            <label for="speed">Verzögerung: </label>
            <input type="range" id="speed" min="1" max="500" value="100">
            <span id="speed-val">100</span> ms
        </div>
    </div>

    <div id="container"></div>

    <script>
        const container = document.getElementById('container');
        const speedInput = document.getElementById('speed');
        const speedVal = document.getElementById('speed-val');
        const startBtn = document.getElementById('start-btn');
        const resetBtn = document.getElementById('reset-btn');
        
        const ARRAY_SIZE = 50;
        let array = [];
        let isSorting = false;

        // Update Geschwindigkeit-Label
        speedInput.addEventListener('input', () => {
            speedVal.textContent = speedInput.value;
        });

        // Delay-Funktion für Animation
        const sleep = () => {
            const ms = parseInt(speedInput.value);
            return new Promise(resolve => setTimeout(resolve, ms));
        };

        // Balken + Zahlen generieren
        function resetArray() {
            if (isSorting) return;
            array = [];
            container.innerHTML = '';
            
            for (let i = 0; i < ARRAY_SIZE; i++) {
                // Zufallswerte von 10 bis 100
                const val = Math.floor(Math.random() * 91) + 10;
                array.push(val);
                
                // 1. Container (.bar-wrapper)
                const wrapper = document.createElement('div');
                wrapper.classList.add('bar-wrapper');
                wrapper.id = `bar-wrapper-${i}`;

                // 2. Zahl (.bar-label)
                const label = document.createElement('span');
                label.classList.add('bar-label');
                label.textContent = val;
                label.id = `bar-label-${i}`;

                // 3. Balken (.bar)
                const bar = document.createElement('div');
                bar.classList.add('bar');
                // Höhe berechnen (max 550px, damit Platz für Zahl bleibt)
                const barHeight = (val / 100) * 550; 
                bar.style.height = `${barHeight}px`;
                bar.id = `bar-${i}`;

                // Zusammenfügen
                wrapper.appendChild(label);
                wrapper.appendChild(bar);
                container.appendChild(wrapper);
            }
            startBtn.disabled = false;
        }

        // Höhe und Text eines spezifischen Balkens aktualisieren
        function updateVisuals(index, value) {
            const bar = document.getElementById(`bar-${index}`);
            const label = document.getElementById(`bar-label-${index}`);
            if (bar && label) {
                const barHeight = (value / 100) * 550;
                bar.style.height = `${barHeight}px`;
                label.textContent = value;
            }
        }

        // Der korrigierte CombSort Algorithmus
        async function combSort() {
            let n = array.length;
            let gap = n;
            const shrink = 1.3;
            let sorted = false;

            while (!sorted) {
                gap = Math.floor(gap / shrink);
                if (gap <= 1) {
                    gap = 1;
                    sorted = true; // Angenommen wir sind fertig, wenn kein Tausch bei Gap 1
                }

                let i = 0;
                while (i + gap < n) {
                    // Visuell: Comparing (Rot)
                    const wrapperI = document.getElementById(`bar-wrapper-${i}`);
                    const wrapperGap = document.getElementById(`bar-wrapper-${i + gap}`);
                    wrapperI.classList.add('comparing');
                    wrapperGap.classList.add('comparing');

                    await sleep();

                    if (array[i] > array[i + gap]) {
                        // Werte im Array tauschen
                        let temp = array[i];
                        array[i] = array[i + gap];
                        array[i + gap] = temp;

                        // Visuell: Höhen und Zahlen tauschen
                        updateVisuals(i, array[i]);
                        updateVisuals(i + gap, array[i + gap]);

                        if (gap === 1) {
                            sorted = false; // Tausch bei Gap 1 bedeutet, nicht fertig
                        }
                    }

                    // Visuell: Comparing entfernen
                    wrapperI.classList.remove('comparing');
                    wrapperGap.classList.remove('comparing');

                    i++;
                }
            }

            // Abschluss-Animation: Alles Grün
            const wrappers = document.getElementsByClassName('bar-wrapper');
            for (let k = 0; k < wrappers.length; k++) {
                wrappers[k].classList.add('sorted');
                // Kurzer Delay für "Wischeffekt"
                if (parseInt(speedInput.value) < 100) {
                     await new Promise(r => setTimeout(r, 10));
                } else {
                     await new Promise(r => setTimeout(r, 30));
                }
            }
        }

        async function startSort() {
            isSorting = true;
            startBtn.disabled = true;
            resetBtn.disabled = true;

            await combSort();

            isSorting = false;
            resetBtn.disabled = false;
        }

        // Initiales Setup
        resetArray();
    </script>
</body>
</html>
